{{- if .Values.results.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "voting-app.results.serviceAccountName" . }}-results
  labels:
    {{- include "voting-app.results.labels" . | nindent 4 }}
  {{- with .Values.results.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.results.serviceAccount.automount }}
{{- end }}
