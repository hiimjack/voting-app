{{- if .Values.postgres.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "voting-app.postgres.serviceAccountName" . }}-postgres
  labels:
    {{- include "voting-app.postgres.labels" . | nindent 4 }}
  {{- with .Values.postgres.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.postgres.serviceAccount.automount }}
{{- end }}
