name: Build and push to GitHub Container Registry

on:
  push:
    tags:
      - "*"

permissions:
  packages: write
  contents: read
  attestations: write
  id-token: write

defaults:
  run:
    shell: bash

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    strategy:
      matrix:
        service_name: ["results", "vote"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service_name }}
          tags: |
            ${{ github.ref_name }}
            stable
            latest

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service_name }}
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service_name }}:${{ github.ref_name }}
          format: "table"
          vuln-type: "os,library"
          output: trivy-report.table
      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report-${{ matrix.service_name }}
          path: trivy-report.table
          retention-days: 30
