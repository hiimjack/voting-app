# Default values for voting-app.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""


postgres:
  image:
    repository: postgres
    pullPolicy: IfNotPresent
    tag: "18.1-alpine"
  environment:
    POSTGRES_DB: "voting-app"
    POSTGRES_USER: "voting-app"
    POSTGRES_PASSWORD: "changeMeStrongPassword"
  service:
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  storage:
    storageClass: standard
    size: 10Gi
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""

vote:
  replicaCount: 1
  image:
    repository: "ghcr.io/hiimjack/voting-app-vote"
    pullPolicy: IfNotPresent
    tag: ""

  environment:
    LOG_LEVEL: "info"
    OPTION_A: "Cats"
    OPTION_B: "Dogs"

  strategy: {}
    #type: RollingUpdate
    #rollingUpdate:
    #  maxSurge: 1
    #  maxUnavailable: 0

  imagePullSecrets: []

  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  service:
    type: ClusterIP
    annotations: {}
    port: 80

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
      # - secretName: chart-example-tls
      #   hosts:
      #     - chart-example.local

  # -- Expose the service via gateway-api HTTPRoute
  # Requires Gateway API resources and suitable controller installed within the cluster
  # (see: https://gateway-api.sigs.k8s.io/guides/)
  httpRoute:
    enabled: false
    annotations: {}
    parentRefs:
      - name: gateway
        sectionName: http
        # namespace: default
    hostnames:
      - chart-example.local
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /headers
    #   filters:
    #   - type: RequestHeaderModifier
    #     requestHeaderModifier:
    #       set:
    #       - name: My-Overwrite-Header
    #         value: this-is-the-only-value
    #       remove:
    #       - User-Agent
    # - matches:
    #   - path:
    #       type: PathPrefix
    #       value: /echo
    #     headers:
    #     - name: version
    #       value: v2

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  livenessProbe:
    httpGet:
      path: /
      port: http
  readinessProbe:
    httpGet:
      path: /
      port: http

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  nodeSelector: {}

  tolerations: []

  affinity: {}

